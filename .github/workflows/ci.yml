name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       pharma_guard_test
          POSTGRES_USER:     pharma
          POSTGRES_PASSWORD: pharma
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (poppler)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt ruff mypy pytest pytest-asyncio pytest-cov

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy . --ignore-missing-imports --exclude migrations
        continue-on-error: true   # mypy is advisory until stubs are complete

      - name: Run tests
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: postgresql+asyncpg://pharma:pharma@localhost:5432/pharma_guard_test
          AUTH_ENABLED: "false"
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        continue-on-error: true   # no tests exist yet; remove once test suite is written

  # ── Frontend ─────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — build + lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (type errors caught here)
        working-directory: frontend
        run: npm run build

  # ── Docker build check ────────────────────────────────────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: pharma-guard/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: pharma-guard/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

